services:
  # ── Auth-Luiz ──────────────────────────────────────────────────────────────
  authluiz-db:
    image: postgres:16-alpine
    container_name: authluiz-db
    environment:
      POSTGRES_DB: authluiz
      POSTGRES_USER: ${AUTHLUIZ_DB_USER:-authluiz}
      POSTGRES_PASSWORD: ${AUTHLUIZ_DB_PASSWORD:-authluiz}
    volumes:
      - authluiz-pgdata:/var/lib/postgresql/data
    networks: [luiz-network]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTHLUIZ_DB_USER:-authluiz} -d authluiz"]
      interval: 5s
      timeout: 3s
      retries: 20

  authluiz-backend:
    build:
      context: ../auth-luiz/backend
    container_name: authluiz-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://authluiz-db:5432/authluiz
      SPRING_DATASOURCE_USERNAME: ${AUTHLUIZ_DB_USER:-authluiz}
      SPRING_DATASOURCE_PASSWORD: ${AUTHLUIZ_DB_PASSWORD:-authluiz}
      JWT_RSA_PRIVATE_KEY: ${JWT_RSA_PRIVATE_KEY}
      JWT_RSA_PUBLIC_KEY: ${JWT_RSA_PUBLIC_KEY}
      JWT_EXPIRATION_MINUTES: ${JWT_EXPIRATION_MINUTES:-120}
      APP_SETUP_MASTER_KEY: ${AUTHLUIZ_SETUP_MASTER_KEY}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID}
    ports:
      - "8080:8080"
    depends_on:
      authluiz-db:
        condition: service_healthy
    networks: [luiz-network]

  authluiz-frontend:
    build:
      context: ../auth-luiz/frontend
    container_name: authluiz-frontend
    ports:
      - "80:80"
    depends_on:
      - authluiz-backend
    networks: [luiz-network]

  # ── PermissoesLuiz ─────────────────────────────────────────────────────────
  permissoes-db:
    image: postgres:16-alpine
    container_name: permissoes-db
    environment:
      POSTGRES_DB: permissoesluiz
      POSTGRES_USER: ${PERMISSOES_DB_USER:-permissoes}
      POSTGRES_PASSWORD: ${PERMISSOES_DB_PASSWORD:-permissoes}
    volumes:
      - permissoes-pgdata:/var/lib/postgresql/data
    networks: [luiz-network]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PERMISSOES_DB_USER:-permissoes} -d permissoesluiz"]
      interval: 5s
      timeout: 3s
      retries: 20

  permissoes-backend:
    build:
      context: ../permissoes-luiz/backend
    container_name: permissoes-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://permissoes-db:5432/permissoesluiz
      SPRING_DATASOURCE_USERNAME: ${PERMISSOES_DB_USER:-permissoes}
      SPRING_DATASOURCE_PASSWORD: ${PERMISSOES_DB_PASSWORD:-permissoes}
      AUTH_LUIZ_JWKS_URI: http://authluiz-backend:8080/auth/.well-known/jwks.json
      APP_SETUP_MASTER_KEY: ${PERMISSOES_SETUP_MASTER_KEY}
    ports:
      - "8081:8080"
    depends_on:
      permissoes-db:
        condition: service_healthy
      authluiz-backend:
        condition: service_started
    networks: [luiz-network]

  permissoes-frontend:
    build:
      context: ../permissoes-luiz/frontend
    container_name: permissoes-frontend
    ports:
      - "81:80"
    depends_on:
      - permissoes-backend
    networks: [luiz-network]

volumes:
  authluiz-pgdata:
  permissoes-pgdata:

networks:
  luiz-network:
    driver: bridge
