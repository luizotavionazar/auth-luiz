server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location ~ ^/(me|admin|setup)(/|$) {
        proxy_pass http://permluiz-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Navegação direta do browser (refresh) chega sem token e o backend retorna 401.
        # Nesse caso entrega o SPA para que ele gerencie o redirecionamento de autenticação.
        # Chamadas da API (axios) vão direto para a porta 8081, não passam por aqui.
        proxy_intercept_errors on;
        error_page 401 403 =200 /index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
